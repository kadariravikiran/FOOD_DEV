apiVersion: apps/v1
kind: Deployment

metadata:
  name: food-dev-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: food-dev

  template:
    metadata:
      labels:
        app: food-dev

    spec:
      containers:
      - name: food-dev-container
        image: ravikirankadari/food-dev:v1

        ports:
        - containerPort: 8080
